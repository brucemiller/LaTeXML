<span class="ltx_inline-block ltx_minipage ltx_align_bottom" style="width:10.50em;">
<span class="ltx_p">When <span class="ltx_text" style="--ltx-bg-color:#BAE6FF;">Sophie</span> watches her <span class="ltx_text" style="--ltx-bg-color:#FFD9BE;">nephew</span>, she gets out a variety of toys for him. The bag of building blocks has <span class="ltx_text" style="--ltx-bg-color:#D4BBFF;">31</span> blocks in it. The bin of stuffed animals has <span class="ltx_text" style="--ltx-bg-color:#FFD6E8;">8</span> stuffed animals inside. The tower of stacking rings has <span class="ltx_text" style="--ltx-bg-color:#FDDC69;">9</span> multicolored rings on it. <span class="ltx_text" style="--ltx-bg-color:#BAE6FF;">Sophie</span> recently bought a tube of bouncy balls, bringing her total number of toys for her <span class="ltx_text" style="--ltx-bg-color:#FFD9BE;">nephew</span> up to <span class="ltx_text" style="--ltx-bg-color:#A7F0BA;">62</span>. How many bouncy balls came in the tube?</span>
</span></span></span></foreignObject></g><g fill-opacity="1.0" transform="matrix(1.0 0.0 0.0 1.0 21.65 13.78)"><foreignObject style="--ltx-fg-color:#000000;font-size:13.84px;--ltx-fo-width:10.50em;--ltx-fo-height:192.26px;--ltx-fo-depth:0px;" color="#000000" height="192.26" overflow="visible" transform="matrix(1 0 0 -1 0 192.26)" width="145.26"><span class="ltx_foreignobject_container"><span class="ltx_foreignobject_content">
<span class="ltx_inline-block ltx_minipage ltx_align_bottom" style="width:10.50em;">
<span class="ltx_p">Let T be the number of bouncy balls in the tube.</span>
<span class="ltx_p">After buying the tube of balls, <span class="ltx_text" style="--ltx-bg-color:#BAE6FF;">Sophie</span> has <span class="ltx_text" style="--ltx-bg-color:#D4BBFF;">31</span>+<span class="ltx_text" style="--ltx-bg-color:#FFD6E8;">8</span>+<span class="ltx_text" style="--ltx-bg-color:#FDDC69;">9</span>+ T = 48 + T =<span class="ltx_text" style="--ltx-bg-color:#A7F0BA;">62</span> toys for her <span class="ltx_text" style="--ltx-bg-color:#FFD9BE;">nephew</span>.</span>
<span class="ltx_p">Thus, T =<span class="ltx_text" style="--ltx-bg-color:#A7F0BA;">62</span>-48 = <math id="S0.F1.p1.pic1.m1" class="ltx_Math" alttext="&lt;" display="inline"><mo>&lt;</mo></math><math id="S0.F1.p1.pic1.m2" class="ltx_Math" alttext="&lt;" display="inline"><mo>&lt;</mo></math><span class="ltx_text" style="--ltx-bg-color:#A7F0BA;">62</span>-48=<span class="ltx_text" style="--ltx-bg-color:#C6C6C6;">14</span><math id="S0.F1.p1.pic1.m3" class="ltx_Math" alttext="&gt;" display="inline"><mo>&gt;</mo></math><math id="S0.F1.p1.pic1.m4" class="ltx_Math" alttext="&gt;" display="inline"><mo>&gt;</mo></math><span class="ltx_text" style="--ltx-bg-color:#C6C6C6;">14</span> bouncy balls came in the tube.</span>
</span></span></span></foreignObject></g></g></svg></span>

<div id="S0.F1.p2" class="ltx_para ltx_noindent">
<span class="ltx_inline-block"><svg id="S0.F1.p2.pic1" class="ltx_picture" height="624.9" overflow="visible" version="1.1" viewBox="0 0 284.04 624.9" width="284.04"><g style="--ltx-stroke-color:#000000;--ltx-fill-color:#000000;" fill="#000000" stroke="#000000" stroke-width="0.4pt" transform="translate(0,624.9) matrix(1 0 0 -1 0 0)"><g style="--ltx-fill-color:#404040;" fill="#404040" fill-opacity="1.0"><path style="stroke:none" d="M 0 5.91 L 0 619 C 0 622.26 2.64 624.9 5.91 624.9 L 278.13 624.9 C 281.4 624.9 284.04 622.26 284.04 619 L 284.04 5.91 C 284.04 2.64 281.4 0 278.13 0 L 5.91 0 C 2.64 0 0 2.64 0 5.91 Z"></path></g><g style="--ltx-fill-color:#F2F2F2;" fill="#F2F2F2" fill-opacity="1.0"><path style="stroke:none" d="M 1.97 5.91 L 1.97 600.79 L 282.07 600.79 L 282.07 5.91 C 282.07 3.73 280.31 1.97 278.13 1.97 L 5.91 1.97 C 3.73 1.97 1.97 3.73 1.97 5.91 Z"></path></g><g style="--ltx-stroke-color:#404040;--ltx-fill-color:#404040;--ltx-fg-color:#404040;" color="#404040" fill="#404040" stroke="#404040" stroke-dasharray="2.84528pt,2.84528pt" stroke-dashoffset="1.42264pt" stroke-opacity="1.0"><path style="fill:none" d="M 1.97 198.8 L 282.07 198.8"></path></g><g fill-opacity="1.0" transform="matrix(1.0 0.0 0.0 1.0 21.65 609.39)"><foreignObject style="--ltx-fg-color:#FFFFFF;font-size:13.84px;--ltx-fo-width:17.40em;--ltx-fo-height:9.61px;--ltx-fo-depth:2.69px;" color="#FFFFFF" height="12.3" overflow="visible" transform="matrix(1 0 0 -1 0 9.61)" width="240.73"><span class="ltx_foreignobject_container"><span class="ltx_foreignobject_content">
<span class="ltx_inline-block ltx_minipage ltx_align_bottom" style="width:17.40em;">
<span class="ltx_p">GSM Symbolic Template</span>
</span></span></span></foreignObject></g><g fill-opacity="1.0" transform="matrix(1.0 0.0 0.0 1.0 21.65 213.31)"><foreignObject style="--ltx-fg-color:#000000;font-size:13.84px;--ltx-fo-width:17.40em;--ltx-fo-height:375.67px;--ltx-fo-depth:2.69px;" color="#000000" height="378.37" overflow="visible" transform="matrix(1 0 0 -1 0 375.67)" width="240.73"><span class="ltx_foreignobject_container"><span class="ltx_foreignobject_content">
<span class="ltx_inline-block ltx_minipage ltx_align_bottom" style="width:17.40em;">
<span class="ltx_p">When <span class="ltx_text" style="--ltx-bg-color:#BAE6FF;">{name}</span> watches her <span class="ltx_text" style="--ltx-bg-color:#FFD9BE;">{family}</span>, she gets out a variety of toys for him. The bag of building blocks has <span class="ltx_text" style="--ltx-bg-color:#D4BBFF;">{x}</span> blocks in it. The bin of stuffed animals has <span class="ltx_text" style="--ltx-bg-color:#FFD6E8;">{y}</span> stuffed animals inside. The tower of stacking rings has <span class="ltx_text" style="--ltx-bg-color:#FDDC69;">{z}</span> multicolored rings on it. <span class="ltx_text" style="--ltx-bg-color:#BAE6FF;">{name}</span> recently bought a tube of bouncy balls, bringing her total number of toys she bought for her <span class="ltx_text" style="--ltx-bg-color:#FFD9BE;">{family}</span> up to <span class="ltx_text" style="--ltx-bg-color:#A7F0BA;">{total}</span>. How many bouncy balls came in the tube?</span>
<span class="ltx_p">#variables:</span>
<span class="ltx_p">- <span class="ltx_text" style="--ltx-bg-color:#BAE6FF;">name</span> = sample(names)</span>
<span class="ltx_p">- <span class="ltx_text" style="--ltx-bg-color:#FFD9BE;">family</span> = sample([”nephew”, ”cousin”, ”brother”])</span>
<span class="ltx_p">- <span class="ltx_text" style="--ltx-bg-color:#D4BBFF;">x</span> = range(5, 100)</span>
<span class="ltx_p">- <span class="ltx_text" style="--ltx-bg-color:#FFD6E8;">y</span> = range(5, 100)</span>
<span class="ltx_p">- <span class="ltx_text" style="--ltx-bg-color:#FDDC69;">z</span> = range(5, 100)</span>
<span class="ltx_p">- <span class="ltx_text" style="--ltx-bg-color:#A7F0BA;">total</span> = range(100, 500)</span>
<span class="ltx_p">- <span class="ltx_text" style="--ltx-bg-color:#C6C6C6;">ans</span> = range(85, 200)</span>
<span class="ltx_p">#conditions:</span>
<span class="ltx_p">- <span class="ltx_text" style="--ltx-bg-color:#D4BBFF;">x</span> + <span class="ltx_text" style="--ltx-bg-color:#FFD6E8;">y</span> + <span class="ltx_text" style="--ltx-bg-color:#FDDC69;">z</span> + <span class="ltx_text" style="--ltx-bg-color:#C6C6C6;">ans</span> == <span class="ltx_text" style="--ltx-bg-color:#A7F0BA;">total</span></span>
</span></span></span></foreignObject></g><g fill-opacity="1.0" transform="matrix(1.0 0.0 0.0 1.0 21.65 77.76)"><foreignObject style="--ltx-fg-color:#000000;font-size:13.84px;--ltx-fo-width:17.40em;--ltx-fo-height:109.24px;--ltx-fo-depth:2.69px;" color="#000000" height="111.93" overflow="visible" transform="matrix(1 0 0 -1 0 109.24)" width="240.73"><span class="ltx_foreignobject_container"><span class="ltx_foreignobject_content">
<span class="ltx_inline-block ltx_minipage ltx_align_bottom" style="width:17.40em;">
<span class="ltx_p">Let T be the number of bouncy balls in the tube. After buying the tube of balls, <span class="ltx_text" style="--ltx-bg-color:#BAE6FF;">{name}</span> has <span class="ltx_text" style="--ltx-bg-color:#D4BBFF;">{x}</span> + <span class="ltx_text" style="--ltx-bg-color:#FFD6E8;">{y}</span> + <span class="ltx_text" style="--ltx-bg-color:#FDDC69;">{z}</span> + T = {<span class="ltx_text" style="--ltx-bg-color:#D4BBFF;">x</span>+<span class="ltx_text" style="--ltx-bg-color:#FFD6E8;">y</span>+<span class="ltx_text" style="--ltx-bg-color:#FDDC69;">z</span>} + T = <span class="ltx_text" style="--ltx-bg-color:#A7F0BA;">{total}</span> toys for her <span class="ltx_text" style="--ltx-bg-color:#FFD9BE;">{family}</span>.</span>
<span class="ltx_p">Thus, T = <span class="ltx_text" style="--ltx-bg-color:#A7F0BA;">{total}</span> - {<span class="ltx_text" style="--ltx-bg-color:#D4BBFF;">x</span>+<span class="ltx_text" style="--ltx-bg-color:#FFD6E8;">y</span>+<span class="ltx_text" style="--ltx-bg-color:#FDDC69;">z</span>} = <span class="ltx_text" style="--ltx-bg-color:#C6C6C6;">{ans}</span> bouncy balls came in the tube.</span>
</span></span></span></foreignObject></g></g></svg></span>
</div>
