<span class="ltx_inline-block ltx_minipage ltx_align_bottom" style="width:30.89em;">
<span class="ltx_p"><span class="ltx_text" style="font-size:80%;">The current kernel runs the 256<math id="S0.F1.p1.pic1.m1" class="ltx_Math" alttext="\times" display="inline"><mo>×</mo></math>256 loop fully sequentially (<math id="S0.F1.p1.pic1.m2" class="ltx_Math" alttext="\sim" display="inline"><mo>∼</mo></math>65,543 cycles), so there is still headroom. To slash the latency you should:</span></span>
<span id="S0.I1" class="ltx_enumerate">
<span id="S0.I1.i1" class="ltx_item" style="list-style-type:none;"><span class="ltx_tag ltx_tag_item">1.</span> 
<span id="S0.I1.i1.p1" class="ltx_para">
<span class="ltx_p"><span class="ltx_text" style="font-size:80%;">Hoist </span><span class="ltx_text ltx_font_typewriter" style="font-size:80%;">B[i]</span><span class="ltx_text" style="font-size:80%;"> load out of the inner j-loop so you only read B once per row.</span></span>
</span></span>
<span id="S0.I1.i2" class="ltx_item" style="list-style-type:none;padding-top:2.0pt;"><span class="ltx_tag ltx_tag_item">2.</span> 
<span id="S0.I1.i2.p1" class="ltx_para">
<span class="ltx_p"><span class="ltx_text" style="font-size:80%;">Pipeline the inner loop with II=1 (#pragma HLS pipeline II=1).</span></span>
</span></span>
<span id="S0.I1.i3" class="ltx_item" style="list-style-type:none;padding-top:2.0pt;"><span class="ltx_tag ltx_tag_item">3.</span> 
<span id="S0.I1.i3.p1" class="ltx_para">
<span class="ltx_p"><span class="ltx_text" style="font-size:80%;">Vectorize by a factor of 4 on a 128-bit data path: pack 4 values into one AXI transfer, unroll the inner loop by 4, and operate on 4 elements/cycle to get a 4</span><math id="S0.I1.i3.p1.m1" class="ltx_Math" alttext="\times" display="inline"><mo mathsize="0.800em">×</mo></math><span class="ltx_text" style="font-size:80%;"> speedup.</span></span>
</span></span>
<span id="S0.I1.i4" class="ltx_item" style="list-style-type:none;padding-top:2.0pt;"><span class="ltx_tag ltx_tag_item">4.</span> 
<span id="S0.I1.i4.p1" class="ltx_para">
<span class="ltx_p"><span class="ltx_text" style="font-size:80%;">(Optional) Separate memory-load, compute and write into three functions and apply #pragma HLS dataflow to overlap A/B reads, compute, and C writes.</span></span>
</span></span>
</span>
<span class="ltx_p"><span class="ltx_text" style="font-size:80%;">With these changes you can reduce the cycles from <math id="S0.F1.p1.pic1.m3" class="ltx_Math" alttext="\sim" display="inline"><mo>∼</mo></math>65,536 to <math id="S0.F1.p1.pic1.m4" class="ltx_Math" alttext="\sim" display="inline"><mo>∼</mo></math>16,384 (plus a small pipeline fill/drain), cutting your latency by 4<math id="S0.F1.p1.pic1.m5" class="ltx_Math" alttext="\times" display="inline"><mo>×</mo></math>.</span></span>
</span></span></span></foreignObject></g></g></svg></span>
